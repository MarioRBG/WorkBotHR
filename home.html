<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkBot - Home</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <!-- MENU LATERAL -->
    <nav class="MenuLateral">
        <a href="#"><i class="fa-solid fa-house"></i>Home</a>
        <a href="#"><i class="fa-solid fa-users"></i>Empleados</a>
        <a href="#"><i class="fa-solid fa-file-invoice"></i>Gestion de talento</a>
        <a href="#"><i class="fa-solid fa-chart-simple"></i>Rendimiento</a>
        <a href="#"><i class="fa-solid fa-calendar-days"></i>Horario</a>
        <a href="#"><i class="fa-solid fa-shield-halved"></i>Politica</a>
    </nav>
    <!-- BOTONES PARTE SUPERIOR DEL HOME -->
    <br>
    <button type="button" class="Boton-Notificaciones">
        <span><i class="fa-regular fa-bell"></i></span>
    </button>
    <button type="button" class="Boton-Configuracion">
        <span><i class="fa-solid fa-gear"></i></span>
    </button>
    <button type="button" class="Boton-Perfil">
        <span><i class="fa-regular fa-user"></i></span>
    </button>
    <br>
    <hr>
    <br>
    <!-- BARRA DE BUSQUEDA -->
    <div class="container">
        <button><i class="fa-solid fa-magnifying-glass"></i></button>
        <input type="text" placeholder="Buscar archivo...">
    </div>
    <!-- ACCESO RAPIDO, NOMINA, RECLUTAMIENTO, ETC... -->
    <h2>Acceso Rapido</h2>
    <div class="box">
        <h3>Nomina</h3>
    </div>
    <div class="box">
        <h3>Reclutamiento</h3>
    </div>
    <div class="box">
        <h3>Asistencia</h3>
    </div>
    <div class="box">
        <h3>Desempeño</h3>
    </div>
    <hr>
    <!-- TABLA FLUJO DE TRABAJO -->
    <h2>Flujo de Trabajo</h2>
    <article>
        <table border="1">
            <tr>
                <th><input type="checkbox"></th>
                <th>Elemento</th>
                <th>Persona</th>
                <th>Estado</th>
                <th>Propiedad</th>
                <th>Seguimiento de Area</th>
                <th>Fecha</th>
            </tr>
            <tr>
                <td><input type="checkbox"></td>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
            </tr>
            <tr>
                <td><input type="checkbox"></td>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
            </tr>
            <tr>
                <td><input type="checkbox"></td>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
            </tr>
        </table>
    </article>
</body>
</html>
